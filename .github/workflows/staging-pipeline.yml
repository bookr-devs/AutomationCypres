name: Staging Pipeline

on:
  workflow_dispatch:

jobs:

  clear-cancelappts:
    name: "Clear - Cancel Appointments"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-cancelappts.cy.js

  clear-customers:
    name: "Clear - Customers"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-dltcust.cy.js

  clear-employees:
    name: "Clear - Employees"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-dltemply.cy.js

  clear-products:
    name: "Clear - Products"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-dltprod.cy.js

  clear-brands:
    name: "Clear - Brands"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-dltsbrand.cy.js

  clear-categories:
    name: "Clear - Categories"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-dltscat.cy.js

  clear-subscriptions:
    name: "Clear - Subscriptions"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-dltsubs.cy.js

  clear-suppliers:
    name: "Clear - Suppliers"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging-clear-optimized/stg-dltsup.cy.js

  staging-group1:
    name: "Staging - Group 1 - Calendar (light)"
    runs-on: ubuntu-latest
    needs: [clear-cancelappts, clear-customers, clear-employees, clear-products, clear-brands, clear-categories, clear-subscriptions, clear-suppliers]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging/calendar/stg-blcktime.cy.js,cypress/e2e/staging/calendar/stg-invoices.cy.js,cypress/e2e/staging/calendar/stg-newAppt.cy.js

  staging-group2:
    name: "Staging - Group 2 - Calendar (heavy)"
    runs-on: ubuntu-latest
    needs: [clear-cancelappts, clear-customers, clear-employees, clear-products, clear-brands, clear-categories, clear-subscriptions, clear-suppliers]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging/calendar/stg-crtapt.cy.js,cypress/e2e/staging/calendar/stg-newchck.cy.js,cypress/e2e/staging/calendar/stg-apptchck.cy.js

  staging-group3:
    name: "Staging - Group 3 - Employees & Customers"
    runs-on: ubuntu-latest
    needs: [clear-cancelappts, clear-customers, clear-employees, clear-products, clear-brands, clear-categories, clear-subscriptions, clear-suppliers]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging/employees/**/*.cy.js,cypress/e2e/staging/customers/**/*.cy.js

  staging-group4:
    name: "Staging - Group 4 - Inventory, Offers, Subs, Coupons & Giftcards"
    runs-on: ubuntu-latest
    needs: [clear-cancelappts, clear-customers, clear-employees, clear-products, clear-brands, clear-categories, clear-subscriptions, clear-suppliers]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/staging/inventory/**/*.cy.js,cypress/e2e/staging/offers/**/*.cy.js,cypress/e2e/staging/subscriptions/**/*.cy.js,cypress/e2e/staging/coupons/**/*.cy.js,cypress/e2e/staging/giftcards/**/*.cy.js
